<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Script Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f1;
  --surface:#ffffff;
  --surface2:#f0efe9;
  --border:#e2dfd8;
  --border2:#c8c5bc;
  --text:#1c1b18;
  --text2:#6a6860;
  --text3:#aaa79f;
  --accent:#c8880a;
  --accent-bg:#fff7e0;
  --accent-border:#edc34a;
  --red:#c03838;
  --red-bg:#fff0f0;
  --blue:#1a6abf;
  --blue-bg:#eef4ff;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── Topbar ── */
.topbar{background:var(--surface);border-bottom:1.5px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo{font-family:'Zen Kaku Gothic New',sans-serif;font-size:17px;font-weight:900;color:var(--text);letter-spacing:0.05em}
.logo em{color:var(--accent);font-style:normal}
.spacer{flex:1}
.btn{font-family:'Noto Sans JP',sans-serif;font-size:13px;padding:7px 15px;border-radius:7px;border:1.5px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;transition:all 0.13s;white-space:nowrap;font-weight:500;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:var(--surface2);border-color:#aaa}
.btn.solid{background:var(--text);color:#fff;border-color:var(--text);font-weight:700}
.btn.solid:hover{background:#333}
.btn.accent{border-color:var(--accent-border);background:var(--accent-bg);color:var(--accent)}
.btn.accent:hover{background:#faefc5}
.btn.ghost{border-color:transparent;background:transparent;color:var(--text2)}
.btn.ghost:hover{background:var(--surface2);color:var(--text)}
.btn.danger-sm{border-color:#e0a0a0;background:var(--red-bg);color:var(--red);font-size:12px;padding:5px 11px}
.btn.danger-sm:hover{background:#fde0e0}
.btn:disabled{opacity:0.45;cursor:not-allowed}

/* ── Layout ── */
.main{display:flex;flex:1;min-height:0}

/* ── Sidebar ── */
.sidebar{width:256px;background:var(--surface);border-right:1.5px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;min-height:0}
.sidebar-hd{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.sidebar-lbl{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);font-weight:700;flex:1}
.cnt{font-family:'Space Mono',monospace;font-size:11px;color:var(--text3)}
.slist{flex:1;overflow-y:auto;padding:8px;min-height:0}
.slist::-webkit-scrollbar{width:3px}
.slist::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.si{padding:10px 12px;border-radius:8px;cursor:pointer;transition:all 0.12s;border:1.5px solid transparent;margin-bottom:3px}
.si:hover{background:var(--surface2)}
.si.active{background:var(--accent-bg);border-color:var(--accent-border)}
.si-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si.active .si-title{color:var(--accent)}
.si-meta{font-size:11px;color:var(--text3);margin-top:3px;font-family:'Space Mono',monospace}
.empty-list{text-align:center;padding:40px 12px;color:var(--text3);font-size:13px;line-height:2}
.sidebar-ft{padding:12px;border-top:1px solid var(--border);flex-shrink:0}

/* ── Content ── */
.content{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text3)}
.welcome-icon{font-size:52px;opacity:0.25}
.welcome-text{font-size:15px;font-weight:500}
.welcome-sub{font-size:13px}

/* ── Script view ── */
.sv{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.sv-hd{padding:12px 20px;border-bottom:1.5px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sv-title-inp{font-family:'Zen Kaku Gothic New',sans-serif;font-size:18px;font-weight:900;color:var(--text);border:none;outline:none;background:transparent;flex:1;min-width:0;padding:4px 8px;border-radius:5px;transition:background 0.13s}
.sv-title-inp:hover,.sv-title-inp:focus{background:var(--surface2)}
.sv-title-inp::placeholder{color:var(--text3);font-weight:400}
.fc-wrap{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:7px;overflow:hidden}
.fc-btn{width:32px;height:32px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-weight:700;transition:background 0.12s;display:flex;align-items:center;justify-content:center}
.fc-btn:hover{background:var(--surface2)}
.fc-val{font-family:'Space Mono',monospace;font-size:11px;color:var(--text3);padding:0 8px;height:32px;display:flex;align-items:center;border-left:1px solid var(--border);border-right:1px solid var(--border)}

/* ── Editor / Viewer ── */
.sv-body{flex:1;overflow-y:auto;padding:32px 48px;background:var(--bg);min-height:0;display:flex;flex-direction:column}
.sv-body::-webkit-scrollbar{width:6px}
.sv-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.sv-body::-webkit-scrollbar-track{background:transparent}

/* The editable area */
.sv-editor{
  outline:none;
  min-height:200px;
  word-break:break-word;
  line-height:1.75;
  color:var(--text);
}
.sv-editor:empty::before{content:attr(data-ph);color:var(--text3);font-size:16px;font-family:'Noto Sans JP',sans-serif;font-weight:400;pointer-events:none}

/* ── Rendered content styles ── */
.sec-hd{
  font-family:'Zen Kaku Gothic New',sans-serif;font-weight:900;
  border-bottom:2px solid var(--text);
  padding-bottom:5px;margin:20px 0 10px;
  color:var(--text);
}
.sec-hd:first-child{margin-top:0}

.spec-table{
  width:100%;border-collapse:collapse;
  border:1.5px solid var(--border);border-radius:10px;
  overflow:hidden;margin:0 0 16px;
  font-size:inherit;
}
.spec-table td{padding:9px 14px;border-bottom:1px solid var(--border);vertical-align:top}
.spec-table tr:last-child td{border-bottom:none}
.spec-key{color:var(--text2);width:1%;white-space:nowrap;padding-right:20px;font-size:0.88em;font-weight:500}
.spec-val{color:var(--text);font-weight:700}

.body-line{padding:2px 0}
.body-spacer{height:10px}

/* ── Keyword colors ── */
.kw-red{color:var(--red);font-weight:700;background:var(--red-bg);padding:1px 4px;border-radius:3px;font-size:0.95em}
.kw-blue{color:var(--blue);font-weight:700;background:var(--blue-bg);padding:1px 4px;border-radius:3px;font-size:0.95em}

/* ── Editor wrapper with link overlay ── */
.editor-wrap{position:relative;flex:1;min-height:100%}
.sv-raw{
  display:block;width:100%;height:100%;min-height:100%;
  border:none;outline:none;background:transparent;
  line-height:1.75;color:var(--text);resize:none;
  box-sizing:border-box;position:relative;z-index:1;
}
.link-overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;white-space:pre-wrap;word-break:break-word;
  line-height:1.75;box-sizing:border-box;z-index:2;
  color:transparent;
}
.link-overlay a{
  pointer-events:auto;color:var(--blue);text-decoration:underline;
  cursor:pointer;position:relative;
}

/* ── Modals ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.overlay.hidden{display:none}
.modal{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;width:100%;max-width:640px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,0.12)}
.modal.sm{max-width:420px}
.mh{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.mh-t{font-size:16px;font-weight:700;font-family:'Zen Kaku Gothic New',sans-serif;flex:1}
.mb{padding:20px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
.mf{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.fl{font-size:11px;color:var(--text2);letter-spacing:0.1em;text-transform:uppercase;font-weight:700;margin-bottom:6px}
.fi{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;outline:none;transition:border-color 0.13s;width:100%}
.fi:focus{border-color:var(--accent-border);background:#fff}
.fta{resize:vertical;min-height:130px;line-height:1.7}

/* Import tabs */
.itabs{display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden}
.itab{flex:1;padding:9px;text-align:center;cursor:pointer;font-size:13px;font-weight:700;color:var(--text2);background:transparent;border:none;transition:all 0.13s;font-family:'Noto Sans JP',sans-serif;border-right:1px solid var(--border)}
.itab:last-child{border-right:none}
.itab.active{background:var(--text);color:#fff}

.dz{border:2px dashed var(--border2);border-radius:10px;padding:28px;text-align:center;color:var(--text3);cursor:pointer;transition:all 0.15s;background:var(--bg);font-size:14px;line-height:1.9}
.dz:hover,.dz.dg{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.dz input{display:none}

.ai-box{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:14px;font-size:13px;color:var(--text2);line-height:1.7;min-height:80px;max-height:220px;overflow-y:auto;font-family:'Noto Sans JP',sans-serif;white-space:pre-wrap}
.ai-box.ld{display:flex;align-items:center;gap:10px;color:var(--text3)}
.spin{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:sp 0.8s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:500;z-index:500;transform:translateY(60px);opacity:0;transition:all 0.25s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.hidden{display:none!important}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SCRIPT<em>BOARD</em></div>
  <div class="spacer"></div>
  <button class="btn accent" onclick="saveAllNow()">&#x1F4BE; 保存</button>
  <button class="btn" onclick="openImport()">&#x2B07; インポート</button>
  <button class="btn solid" onclick="openNew()">&#xFF0B; 新規作成</button>
</div>

<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-hd">
      <span class="sidebar-lbl">原稿一覧</span>
      <span class="cnt" id="cntLabel">0件</span>
    </div>
    <div class="slist" id="scriptList">
      <div class="empty-list">原稿がありません<br>「＋ 新規作成」から追加</div>
    </div>
    <div class="sidebar-ft">
      <button class="btn ghost" style="width:100%;justify-content:center;font-size:12px" onclick="refreshData()">&#x267B; データを更新</button>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-icon">&#x1F4DD;</div>
      <div class="welcome-text">原稿を選択してください</div>
      <div class="welcome-sub">左の一覧から選ぶか、新規作成してください</div>
    </div>

    <div class="sv hidden" id="scriptView">
      <div class="sv-hd">
        <button class="btn ghost" style="padding:6px 10px" onclick="backToList()">&#x2190; 一覧へ</button>
        <input class="sv-title-inp" id="viewTitle" placeholder="タイトルを入力" oninput="onTitleChange()">
        <div class="fc-wrap">
          <button class="fc-btn" onclick="changeFontSize(-4)">A&#x2193;</button>
          <span class="fc-val" id="fcVal">40px</span>
          <button class="fc-btn" onclick="changeFontSize(4)">A&#x2191;</button>
        </div>
        <button class="btn danger-sm" onclick="delCurrent()">削除</button>
      </div>

      <!-- Body: scroll wrapper -->
      <div class="sv-body" id="svBody">
        <div class="editor-wrap">
          <div class="link-overlay" id="linkOverlay"></div>
          <textarea class="sv-raw" id="viewRaw" placeholder="ここに原稿を直接入力・編集できます" oninput="onRawChange()" onscroll="syncScroll()"></textarea>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- New modal -->
<div class="overlay hidden" id="newOverlay" onclick="if(event.target===this)closeNew()">
  <div class="modal sm">
    <div class="mh"><div class="mh-t">新規作成</div><button class="btn ghost" style="padding:4px 10px" onclick="closeNew()">&#x2715;</button></div>
    <div class="mb">
      <div>
        <div class="fl">タイトル</div>
        <input type="text" class="fi" id="newTitle" placeholder="例：新台○○○○スペック" onkeydown="if(event.key==='Enter')createNew()">
      </div>
    </div>
    <div class="mf">
      <button class="btn" onclick="closeNew()">キャンセル</button>
      <button class="btn solid" onclick="createNew()">作成</button>
    </div>
  </div>
</div>

<!-- Import modal -->
<div class="overlay hidden" id="importOverlay" onclick="if(event.target===this)closeImport()">
  <div class="modal">
    <div class="mh"><div class="mh-t">&#x2B07; インポート・AI抽出</div><button class="btn ghost" style="padding:4px 10px" onclick="closeImport()">&#x2715;</button></div>
    <div class="mb">
      <div class="itabs">
        <button class="itab active" id="tabPdf" onclick="switchTab('pdf')">&#x1F4C4; PDFファイル</button>
        <button class="itab" id="tabUrl" onclick="switchTab('url')">&#x1F310; ウェブURL</button>
        <button class="itab" id="tabText" onclick="switchTab('text')">&#x270D; テキスト貼付</button>
      </div>

      <div id="secPdf">
        <div class="fl">PDFをドロップ or クリックで選択</div>
        <div class="dz" id="dz" onclick="document.getElementById('pdfFile').click()"
             ondragover="onDragOver(event)" ondragleave="onDragLeave()" ondrop="onDrop(event)">
          <input type="file" id="pdfFile" accept=".pdf" onchange="onPdfPick(event)">
          <div id="dzLabel">&#x1F4C4; PDFをここにドロップ<br><small>または クリックして選択</small></div>
        </div>
      </div>
      <div id="secUrl" class="hidden">
        <div class="fl">ウェブページのURL</div>
        <input type="url" class="fi" id="iUrl" placeholder="https://...">
      </div>
      <div id="secText" class="hidden">
        <div class="fl">テキストを貼り付け</div>
        <textarea class="fi fta" id="iText" placeholder="ウェブページのテキストや原稿をそのまま貼り付けてください..."></textarea>
      </div>

      <div>
        <div class="fl">抽出モード</div>
        <div class="itabs">
          <button class="itab active" id="modeSpec" onclick="switchMode('spec')" style="font-size:12px;padding:8px">&#x1F4B0; スペック抽出</button>
          <button class="itab" id="modeNews" onclick="switchMode('news')" style="font-size:12px;padding:8px">&#x1F4F0; ニュース・トピックス要約</button>
        </div>
      </div>
      <div>
        <div class="fl">追加の指示（任意）</div>
        <input type="text" class="fi" id="iInstr" placeholder="例：視聴者向けに分かりやすく / 要点を3つにまとめて">
      </div>
      <div>
        <div class="fl">AI抽出結果</div>
        <div class="ai-box" id="aiBox">ここにAIが抽出した内容が表示されます</div>
      </div>
      <div>
        <div class="fl">原稿のタイトル</div>
        <input type="text" class="fi" id="iTitle" placeholder="例：新台スペックまとめ">
      </div>
    </div>
    <div class="mf">
      <button class="btn" onclick="closeImport()">キャンセル</button>
      <button class="btn accent" id="btnEx" onclick="runExtract()">&#x2726; AI抽出</button>
      <button class="btn solid" id="btnSave" onclick="saveImported()" disabled>原稿として保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──
let scripts = [];
let currentId = null;
let fontSize = 40;
let saveTimer = null;
let iTab = 'pdf';
let extractMode = 'spec';
let pdfB64 = null;
let extracted = '';

// ── API通信層 ──────────────────────────────────────

async function load() {
  try {
    const r = await fetch('/api/scripts');
    scripts = await r.json();
  } catch { scripts = []; }
}

async function save() {
  // 変更された原稿1件をPOST
  const s = scripts.find(x => x.id === currentId);
  if (!s) return;
  try {
    await fetch('/api/scripts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(s),
    });
  } catch { showToast('⚠ 保存に失敗しました'); }
}

async function saveAll() {
  // 新規作成時など全件保存が必要な場合
  for (const s of scripts) {
    await fetch('/api/scripts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(s),
    });
  }
}

async function deleteFromServer(id) {
  await fetch(`/api/scripts/${id}`, { method: 'DELETE' });
}

async function saveAllNow() {
  try {
    await saveAll();
    showToast('✓ すべて保存しました');
  } catch { showToast('⚠ 保存に失敗しました'); }
}

function scheduleSave() { clearTimeout(saveTimer); saveTimer = setTimeout(save, 800); }

// ── Sidebar ──
function renderList() {
  const el = document.getElementById('scriptList');
  document.getElementById('cntLabel').textContent = scripts.length + '件';
  if (!scripts.length) { el.innerHTML = '<div class="empty-list">原稿がありません<br>「＋ 新規作成」から追加</div>'; return; }
  el.innerHTML = scripts.map(s => `
    <div class="si${s.id===currentId?' active':''}" onclick="selectScript('${s.id}')">
      <div class="si-title">${esc(s.title||'（タイトルなし）')}</div>
      <div class="si-meta">${ago(s.updatedAt)}</div>
    </div>`).join('');
}

// ── Select ──
function selectScript(id) {
  currentId = id;
  const s = scripts.find(x=>x.id===id);
  if (!s) return;
  document.getElementById('welcomeScreen').classList.add('hidden');
  document.getElementById('scriptView').classList.remove('hidden');
  document.getElementById('viewTitle').value = s.title || '';
  const raw = document.getElementById('viewRaw');
  raw.value = s.body || '';
  raw.style.fontSize = fontSize + 'px';
  raw.style.fontFamily = "'Zen Kaku Gothic New', sans-serif";
  raw.style.fontWeight = '700';
  raw.style.lineHeight = '1.75';
  renderList();
  updateLinkOverlay();
}

function backToList() {
  currentId = null;
  document.getElementById('welcomeScreen').classList.remove('hidden');
  document.getElementById('scriptView').classList.add('hidden');
  renderList();
}

function onRawChange() {
  const s = scripts.find(x=>x.id===currentId); if (!s) return;
  s.body = document.getElementById('viewRaw').value;
  s.updatedAt = Date.now();
  scheduleSave(); renderList();
  updateLinkOverlay();
}

// ── Link overlay ──
const urlRegex = /(https?:\/\/[^\s\u3000]+)/g;

function updateLinkOverlay() {
  const raw = document.getElementById('viewRaw');
  const overlay = document.getElementById('linkOverlay');
  const text = raw.value;
  // Mirror textarea styles to overlay
  const cs = getComputedStyle(raw);
  overlay.style.fontSize = cs.fontSize;
  overlay.style.fontFamily = cs.fontFamily;
  overlay.style.fontWeight = cs.fontWeight;
  overlay.style.lineHeight = cs.lineHeight;
  overlay.style.padding = cs.padding;
  // Build overlay HTML: same text but URLs wrapped in <a>
  overlay.innerHTML = esc(text).replace(/(https?:\/\/[^\s\u3000&]+)/g, '<a href="$1" target="_blank" rel="noopener" onclick="event.stopPropagation()">$1</a>');
  syncScroll();
}

function syncScroll() {
  const raw = document.getElementById('viewRaw');
  const overlay = document.getElementById('linkOverlay');
  overlay.scrollTop = raw.scrollTop;
  overlay.scrollLeft = raw.scrollLeft;
}

// ── Font ──
function changeFontSize(d) {
  fontSize = Math.max(20, Math.min(120, fontSize+d));
  document.getElementById('fcVal').textContent = fontSize+'px';
  const raw = document.getElementById('viewRaw');
  raw.style.fontSize = fontSize+'px';
  updateLinkOverlay();
}

// ── Title ──
function onTitleChange() {
  const s = scripts.find(x=>x.id===currentId); if(!s) return;
  s.title = document.getElementById('viewTitle').value;
  s.updatedAt = Date.now();
  scheduleSave(); renderList();
}

// ── New ──
function openNew() { document.getElementById('newTitle').value=''; document.getElementById('newOverlay').classList.remove('hidden'); setTimeout(()=>document.getElementById('newTitle').focus(),50); }
function closeNew() { document.getElementById('newOverlay').classList.add('hidden'); }
async function createNew() {
  const title = document.getElementById('newTitle').value.trim();
  if (!title) { showToast('タイトルを入力してください'); return; }
  const s = { id: 'sc' + Date.now(), title, body: '', updatedAt: Date.now() };
  scripts.unshift(s);
  await fetch('/api/scripts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(s),
  });
  closeNew(); renderList(); selectScript(s.id);
  setTimeout(() => document.getElementById('viewRaw').focus(), 100);
  showToast('✓ 作成しました');
}

// ── Delete ──
async function delCurrent() {
  if (!currentId) return;
  const s = scripts.find(x => x.id === currentId);
  if (!confirm(`「${s?.title || '原稿'}」を削除しますか？`)) return;
  await deleteFromServer(currentId);
  scripts = scripts.filter(x => x.id !== currentId);
  backToList();
  showToast('削除しました');
}

// ── Refresh ──
async function refreshData() {
  await load();
  if (currentId && !scripts.find(x => x.id === currentId)) backToList();
  else if (currentId) selectScript(currentId);
  renderList();
  showToast('♻ 更新しました');
}

// ── Import ──
function openImport() {
  pdfB64=null; extracted='';
  ['iUrl','iText','iInstr','iTitle'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
  document.getElementById('aiBox').textContent='ここにAIが抽出した内容が表示されます';
  document.getElementById('aiBox').classList.remove('ld');
  document.getElementById('btnSave').disabled=true;
  document.getElementById('btnEx').disabled=false;
  document.getElementById('dzLabel').innerHTML='&#x1F4C4; PDFをここにドロップ<br><small>または クリックして選択</small>';
  document.getElementById('pdfFile').value='';
  switchTab('pdf');
  switchMode('spec');
  document.getElementById('importOverlay').classList.remove('hidden');
}
function closeImport() { document.getElementById('importOverlay').classList.add('hidden'); }

function switchMode(m) {
  extractMode = m;
  document.getElementById('modeSpec').classList.toggle('active', m==='spec');
  document.getElementById('modeNews').classList.toggle('active', m==='news');
  const instr = document.getElementById('iInstr');
  instr.placeholder = m==='news'
    ? '例：視聴者向けに分かりやすく / 要点を3つにまとめて'
    : '例：スペック・大当たり確率・出玉を整理してください';
}

function switchTab(t) {
  iTab=t;
  ['pdf','url','text'].forEach(x=>{
    const cap=x[0].toUpperCase()+x.slice(1);
    document.getElementById('tab'+cap).classList.toggle('active',x===t);
    document.getElementById('sec'+cap).classList.toggle('hidden',x!==t);
  });
}

function onDragOver(e){e.preventDefault();document.getElementById('dz').classList.add('dg')}
function onDragLeave(){document.getElementById('dz').classList.remove('dg')}
function onDrop(e){e.preventDefault();document.getElementById('dz').classList.remove('dg');const f=e.dataTransfer.files[0];if(f?.type==='application/pdf')readPdf(f);else showToast('PDFファイルを選択してください')}
function onPdfPick(e){const f=e.target.files[0];if(f)readPdf(f)}
function readPdf(file){
  const r=new FileReader();
  r.onload=()=>{
    pdfB64=r.result.split(',')[1];
    document.getElementById('dzLabel').innerHTML=`✓ ${esc(file.name)}<br><small>クリックで変更</small>`;
    if(!document.getElementById('iTitle').value) document.getElementById('iTitle').value=file.name.replace(/\.pdf$/i,'');
  };
  r.readAsDataURL(file);
}

async function runExtract() {
  const box = document.getElementById('aiBox');
  const instr = document.getElementById('iInstr').value.trim();
  box.innerHTML = '<div class="spin"></div> AIが解析中...';
  box.classList.add('ld');
  document.getElementById('btnEx').disabled = true;
  extracted = '';
  document.getElementById('btnSave').disabled = true;

  const baseRules = `
【出力ルール】
・マークダウン記法（アスタリスク、ハイフン、シャープ記号など）は一切使わないこと
・見出しは必ず【】で囲む。例：【基本スペック】
・箇条書きが必要な場合は行頭に「・」を使う
・日本語で出力
${instr ? '追加指示：' + instr : ''}`;

  const sys = extractMode === 'news'
    ? `あなたは、パチンコ・パチスロのYouTubeチャンネルのスタッフです。
提供されたコンテンツを、ニュース・トピックスとして放送で紹介できるよう要約・整理してください。
${baseRules}
・何が起きた、なぜ重要か、視聴者にとってどんな意味があるかを意識して書く
・難しい用語は平易な言葉に言い換える
・要点は「・」箇条書きで3〜5点にまとめる`
    : `あなたは、パチンコ・パチスロのYouTubeチャンネルのスタッフです。
提供されたコンテンツから、放送で話すのに役立つスペック情報を抽出・整理してください。
${baseRules}
・スペックなどの数値データは「項目名：値」の形式で1行ずつ書く。例：大当たり確率：1/319.7
・RUSHや突入率などの興奮要素はそのままの言葉で書く
・通常、最短、等もそのまま書く
・できるだけ具体的な数値を含める`;

  try {
    let payload;

    if (iTab === 'pdf') {
      if (!pdfB64) { showToast('PDFを選択してください'); resetBtn(); return; }
      payload = {
        system: sys,
        messages: [{
          role: 'user',
          content: [
            { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: pdfB64 } },
            { type: 'text', text: 'このPDFから放送スクリプト用に情報を抽出・整理してください。' }
          ]
        }]
      };

    } else if (iTab === 'url') {
      const url = document.getElementById('iUrl').value.trim();
      if (!url) { showToast('URLを入力してください'); resetBtn(); return; }

      // バックエンドのURLフェッチプロキシを使う
      const fetchResp = await fetch('/api/fetch-url', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url }),
      });
      if (!fetchResp.ok) { showToast('ページの取得に失敗しました。テキスト貼付タブをお試しください。'); resetBtn(); return; }
      const { html } = await fetchResp.json();

      // HTMLからテキスト抽出
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      ['script','style','nav','footer','header','aside','iframe','noscript'].forEach(tag => {
        doc.querySelectorAll(tag).forEach(el => el.remove());
      });
      const main = doc.querySelector('main, article, .main, .content, #main, #content') || doc.body;
      const pageText = (main?.innerText || main?.textContent || '').replace(/\s{3,}/g, '\n\n').trim().slice(0, 6000);
      if (!pageText) { showToast('ページのテキストを取得できませんでした'); resetBtn(); return; }

      payload = {
        system: sys,
        messages: [{
          role: 'user',
          content: `以下はウェブページ（${url}）から取得したテキストです。放送スクリプト用に情報を抽出・整理してください:\n\n${pageText}`
        }]
      };

    } else {
      const txt = document.getElementById('iText').value.trim();
      if (!txt) { showToast('テキストを貼り付けてください'); resetBtn(); return; }
      payload = {
        system: sys,
        messages: [{ role: 'user', content: `以下のテキストから放送スクリプト用に情報を抽出・整理してください:\n\n${txt}` }]
      };
    }

    // バックエンドのAIプロキシ経由で呼ぶ（APIキーを隠す）
    const resp = await fetch('/api/ai/extract', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await resp.json();
    const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n').trim();
    extracted = text;
    box.classList.remove('ld');
    box.textContent = text || '内容を抽出できませんでした';
    document.getElementById('btnSave').disabled = !text;

  } catch (e) {
    box.classList.remove('ld');
    box.textContent = '⚠ エラー: ' + e.message;
  }
  resetBtn();
}
function resetBtn(){ document.getElementById('btnEx').disabled=false; }

async function saveImported() {
  if (!extracted) return;
  const title = document.getElementById('iTitle').value.trim() || '（インポート原稿）';
  const s = { id: 'sc' + Date.now(), title, body: extracted, updatedAt: Date.now() };
  scripts.unshift(s);
  await fetch('/api/scripts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(s),
  });
  closeImport(); renderList(); selectScript(s.id);
  showToast('✓ インポートして保存しました');
}

// ── Utils ──
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function ago(ts){ const d=Date.now()-ts; if(d<60000)return'たった今'; if(d<3600000)return Math.floor(d/60000)+'分前'; if(d<86400000)return Math.floor(d/3600000)+'時間前'; return Math.floor(d/86400000)+'日前'; }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2500); }

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ document.getElementById('newOverlay').classList.add('hidden'); document.getElementById('importOverlay').classList.add('hidden'); }
});

// ── SSE（リアルタイム同期） ──
function connectSSE() {
  const es = new EventSource('/api/events');

  es.addEventListener('update', (e) => {
    const updated = JSON.parse(e.data);
    const idx = scripts.findIndex(x => x.id === updated.id);
    if (idx >= 0) {
      scripts[idx] = updated;
    } else {
      scripts.unshift(updated);
    }
    scripts.sort((a, b) => b.updatedAt - a.updatedAt);
    renderList();
    if (currentId === updated.id) {
      document.getElementById('viewTitle').value = updated.title;
      document.getElementById('viewRaw').value = updated.body;
      updateLinkOverlay();
    }
  });

  es.addEventListener('delete', (e) => {
    const { id } = JSON.parse(e.data);
    scripts = scripts.filter(x => x.id !== id);
    renderList();
    if (currentId === id) backToList();
  });

  es.onerror = () => {
    es.close();
    setTimeout(connectSSE, 3000);
  };
}

(async()=>{ await load(); renderList(); connectSSE(); })();
</script>
